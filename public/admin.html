<div class="card mt-4 p-4">
  <h3 class="font-bold mb-2">データー復旧 (JSONアップロード)</h3>
  <input type="file" id="importFile" accept=".json" class="mb-2 block">
  <button onclick="importData()" class="bg-blue-600 text-white px-4 py-2 rounded">インポート実行</button>
</div>

<script>
async function importData() {
  const file = document.getElementById('importFile').files[0];
  if (!file) return alert('ファイルを選択してください');
  
  const reader = new FileReader();
  reader.onload = async (e) => {
    const json = JSON.parse(e.target.result);
    const res = await fetch('/api/import', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(json)
    });
    const result = await res.json();
    if (result.success) {
      alert('復旧完了！ページを再読み込みします');
      location.reload();
    } else {
      alert('エラー: ' + result.error);
    }
  };
  reader.readAsText(file);
}
</script>
