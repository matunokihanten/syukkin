<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>松乃木飯店 管理画面</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg:#f8fafc;
    --card:#ffffff;
    --accent:#2563eb;
    --danger:#e11d48;
    --ok:#10b981;
    --text:#1e293b;
    --border:#cbd5e1;
    --warn:#f59e0b;
  }
  
  * { box-sizing: border-box; }
  
  body {
    font-family:"Hiragino Kaku Gothic ProN","YuGothic",sans-serif;
    background:var(--bg);
    margin:0;
    padding:10px;
    color:var(--text);
  }
  
  .hidden { display:none !important; }
  
  .edit-time { 
    padding:4px; 
    border:1px solid #ddd; 
    border-radius:4px; 
    font-family:monospace; 
    text-align:center; 
    width:85px; 
  }
  
  .overtime-text { 
    color: var(--danger); 
    font-weight: bold; 
  }
  
  button.action-btn { 
    background:var(--accent); 
    color:#fff; 
    border:none; 
    padding:8px 15px; 
    border-radius:6px; 
    font-weight:600; 
    cursor:pointer; 
  }
  
  button.secondary { 
    background:#fff; 
    color:var(--accent); 
    border:1px solid var(--accent); 
    padding:5px 10px; 
    border-radius:6px; 
    cursor:pointer; 
  }
  
  #toast { 
    position:fixed; 
    top:20px; 
    left:50%; 
    transform:translateX(-50%); 
    background:rgba(0,0,0,0.8); 
    color:#fff; 
    padding:10px 20px; 
    border-radius:20px; 
    z-index:9999; 
    display:none; 
  }
  
  table { 
    width:100%; 
    border-collapse:collapse; 
    font-size:0.85rem; 
    background:#fff; 
  }
  
  th,td { 
    padding:10px; 
    border:1px solid var(--border); 
    text-align:center; 
  }
  
  th { 
    background:#f1f5f9; 
    font-weight:700; 
    color:#475569; 
  }
  
  .modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
  }
  
  .modal-content {
    background:#fff;
    padding:25px;
    border-radius:15px;
    width:95%;
    max-width:700px;
    max-height:90vh;
    overflow-y:auto;
  }
</style>
</head>
<body>
<div id="toast"></div>

<!-- 認証画面 -->
<div id="authArea" class="max-w-md mx-auto mt-20">
  <section class="bg-white p-8 rounded-xl shadow-lg text-center">
    <h2 class="text-2xl font-bold mb-6">🔒 管理者認証</h2>
    <input 
      type="password" 
      id="passInput" 
      placeholder="パスワードを入力" 
      class="w-full px-4 py-3 mb-4 border rounded-lg"
      onkeypress="if(event.key==='Enter') checkPass()"
    >
    <button onclick="checkPass()" class="action-btn w-full py-3 text-lg">ログイン</button>
  </section>
</div>

<!-- メイン画面 -->
<div id="mainArea" class="hidden max-w-7xl mx-auto">
  <header class="bg-white p-4 rounded-xl mb-4 shadow-md border-b-4" style="border-color:var(--accent)">
    <div class="flex justify-between items-center flex-wrap gap-3">
      <div>
        <h1 class="text-2xl font-bold m-0" style="color:var(--accent)">松乃木飯店 管理パネル</h1>
        <small id="statusText">接続中...</small>
      </div>
      <div class="text-right">
        <div id="clockDisplay" class="text-xl font-bold">00:00:00</div>
        <button class="secondary text-xs mt-2" onclick="location.href='/'">打刻画面へ戻る</button>
      </div>
    </div>
  </header>

  <!-- 集計エリア -->
  <section class="bg-white p-5 rounded-xl shadow-lg mb-4 border-l-8" style="border-color:var(--accent)">
    <div class="bg-gray-100 p-3 rounded-lg mb-3 border border-gray-300">
      <label class="font-bold text-sm">表示月:</label>
      <input type="month" id="displayMonth" onchange="renderAll()" class="ml-2 px-2 py-1 border rounded">
      <span id="periodText" class="ml-auto text-sm text-gray-600"></span>
    </div>
    <div class="overflow-x-auto">
      <div id="summaryArea"></div>
    </div>
  </section>

  <!-- 履歴編集エリア -->
  <section class="bg-white p-5 rounded-xl shadow-lg">
    <div class="flex justify-between items-center flex-wrap gap-3 mb-4">
      <h3 class="text-xl font-bold m-0">履歴の修正</h3>
      <div class="flex gap-2 flex-wrap">
        <button class="action-btn" style="background:var(--ok)" onclick="saveAllChanges()">
          ✅ 修正完了
        </button>
        <button class="action-btn" style="background:var(--warn)" onclick="exportToExcel()">
          ⬇ Excel保存
        </button>
        <button class="action-btn secondary" onclick="openSettings()">
          ⚙ システム設定
        </button>
      </div>
    </div>
    <div class="overflow-x-auto">
      <div id="mainLogTable"></div>
    </div>
  </section>
</div>

<!-- 設定モーダル -->
<div id="settingsModal" class="modal hidden">
  <div class="modal-content">
    <h3 class="text-xl font-bold mb-5">システム設定</h3>
    
    <div class="grid grid-cols-2 gap-4 text-sm mb-5">
      <div>
        <label class="block mb-1 font-bold">締め日</label>
        <input id="closingDay" type="number" min="1" max="31" class="w-full px-2 py-1 border rounded">
      </div>
      <div>
        <label class="block mb-1 font-bold">時刻丸め</label>
        <select id="roundUnit" class="w-full px-2 py-1 border rounded">
          <option value="1">1分</option>
          <option value="5">5分</option>
          <option value="15">15分</option>
        </select>
      </div>
      <div>
        <label class="block mb-1 font-bold">自動退勤時刻</label>
        <input id="shopCloseTime" type="time" class="w-full px-2 py-1 border rounded">
      </div>
      <div>
        <label class="block mb-1 font-bold">始業時間</label>
        <input id="workStartTime" type="time" class="w-full px-2 py-1 border rounded">
      </div>
    </div>
    
    <div class="bg-gray-100 p-4 rounded-lg mb-5">
      <strong class="block mb-2">デフォルト休憩時間</strong>
      <div class="flex gap-2 items-center">
        <label>開始:</label>
        <input id="breakStart" type="time" class="px-2 py-1 border rounded">
        <label>〜 終了:</label>
        <input id="breakEnd" type="time" class="px-2 py-1 border rounded">
      </div>
    </div>
    
    <h4 class="text-lg font-bold mb-3">スタッフ管理</h4>
    <div class="overflow-x-auto mb-3">
      <div id="staffListEdit"></div>
    </div>
    
    <div class="flex gap-2 mb-5">
      <input 
        id="newStaffName" 
        placeholder="新しいスタッフ名" 
        class="flex-1 px-3 py-2 border rounded"
      >
      <button onclick="addStaff()" class="action-btn">追加</button>
    </div>
    
    <div class="flex gap-3">
      <button class="action-btn flex-1" onclick="saveSettings()">設定を保存</button>
      <button class="secondary flex-1" onclick="$('settingsModal').classList.add('hidden')">閉じる</button>
    </div>
  </div>
</div>

<script>
// グローバル変数
let staff = [], logs = [], settings = {};
let modifiedLogs = new Map(); // 変更されたログ
let deletedLogIds = new Set(); // 削除されたログID
let isSaving = false;

const $ = id => document.getElementById(id);

// 認証チェック
async function checkPass() {
  const password = $('passInput').value;
  
  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    
    const result = await res.json();
    
    if (result.success) {
      $('authArea').classList.add('hidden');
      $('mainArea').classList.remove('hidden');
      await syncFromServer();
    } else {
      alert('パスワードが違います');
    }
  } catch (e) {
    alert('認証エラー: ' + e.message);
  }
}

// サーバーから同期
async function syncFromServer() {
  if (isSaving) return;
  
  try {
    const res = await fetch('/api/sync');
    if (res.ok) {
      const result = await res.json();
      if (result.success) {
        staff = result.data.staff || [];
        logs = result.data.logs || [];
        settings = result.data.settings || {};
        
        renderAll();
        
        $('statusText').innerText = '✅ 同期完了';
        $('statusText').style.color = 'green';
      }
    }
  } catch (e) {
    console.error('Sync error:', e);
    $('statusText').innerText = '⚠️ 同期エラー';
    $('statusText').style.color = 'red';
  }
}

// 全描画
function renderAll() {
  const targetMonth = $('displayMonth').value;
  const { start, end } = getPeriod(targetMonth);
  
  $('periodText').innerText = `期間: ${start.toLocaleDateString('ja-JP')} 〜 ${end.toLocaleDateString('ja-JP')}`;
  
  const data = processData(targetMonth);
  
  renderSummary(data);
  renderLogTable(data);
}

// 集計表示
function renderSummary(data) {
  let html = `
    <table>
      <thead>
        <tr>
          <th>名前</th>
          <th>出勤日数</th>
          <th>実働時間</th>
          <th>残業時間</th>
        </tr>
      </thead>
      <tbody>
  `;
  
  staff.forEach(s => {
    const staffData = data.find(d => d.staff === s.name);
    if (staffData) {
      html += `
        <tr>
          <td>${s.name}</td>
          <td>${staffData.days}日</td>
          <td>${staffData.workH.toFixed(2)}h</td>
          <td class="overtime-text">${staffData.otH.toFixed(2)}h</td>
        </tr>
      `;
    } else {
      html += `
        <tr>
          <td>${s.name}</td>
          <td>0日</td>
          <td>0.00h</td>
          <td class="overtime-text">0.00h</td>
        </tr>
      `;
    }
  });
  
  html += '</tbody></table>';
  
  $('summaryArea').innerHTML = html;
}

// ログテーブル描画
function renderLogTable(data) {
  let html = `
    <table>
      <thead>
        <tr>
          <th>日付</th>
          <th>氏名</th>
          <th>出勤1</th>
          <th>退勤1</th>
          <th>出勤2</th>
          <th>退勤2</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
  `;
  
  data.forEach(d => {
    const makeInput = (type, idx, log) => {
      const timeValue = log ? new Date(log.timestamp).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) : '';
      const logId = log ? log.id : '';
      
      return `
        <div class="flex gap-1 justify-center">
          <input 
            type="time" 
            class="edit-time" 
            value="${timeValue}"
            data-date="${d.date}"
            data-staff="${d.staff}"
            data-type="${type}"
            data-idx="${idx}"
            data-logid="${logId}"
            onchange="updateLog(this)"
          >
          <button 
            class="secondary px-2 py-1 text-xs" 
            onclick="clearLog(this)"
            data-date="${d.date}"
            data-staff="${d.staff}"
            data-type="${type}"
            data-idx="${idx}"
            data-logid="${logId}"
          >
            空
          </button>
        </div>
      `;
    };
    
    html += `
      <tr>
        <td>${d.date}</td>
        <td>${d.staff}</td>
        <td>${makeInput('IN', 0, d.ins[0])}</td>
        <td>${makeInput('OUT', 0, d.outs[0])}</td>
        <td>${makeInput('IN', 1, d.ins[1])}</td>
        <td>${makeInput('OUT', 1, d.outs[1])}</td>
        <td>
          <button 
            onclick="deleteDayLog('${d.date}', '${d.staff}')" 
            class="px-2 py-1 text-xs text-red-600 border border-red-600 rounded hover:bg-red-50"
          >
            削除
          </button>
        </td>
      </tr>
    `;
  });
  
  html += '</tbody></table>';
  
  $('mainLogTable').innerHTML = html;
}

// ログ更新
function updateLog(input) {
  const { date, staff, type, idx, logid } = input.dataset;
  const newTime = input.value;
  
  if (!newTime) {
    clearLogByData(date, staff, type, idx, logid);
    return;
  }
  
  const timestamp = `${date}T${newTime}:00`;
  
  if (logid) {
    // 既存ログの更新
    modifiedLogs.set(parseInt(logid), {
      id: parseInt(logid),
      timestamp,
      updated_at: Date.now()
    });
  } else {
    // 新規ログ追加
    const newLog = {
      id: Date.now() + Math.random(),
      staff_name: staff,
      type,
      timestamp,
      updated_at: Date.now()
    };
    logs.push(newLog);
    input.dataset.logid = newLog.id;
  }
  
  showToast('変更を記録しました（保存ボタンを押してください）');
}

// ログクリア
function clearLog(btn) {
  const { date, staff, type, idx, logid } = btn.dataset;
  clearLogByData(date, staff, type, idx, logid);
}

function clearLogByData(date, staff, type, idx, logid) {
  if (logid) {
    deletedLogIds.add(parseInt(logid));
    logs = logs.filter(l => l.id !== parseInt(logid));
  }
  
  renderAll();
  showToast('削除を記録しました（保存ボタンを押してください）');
}

// 日単位削除
function deleteDayLog(date, staffName) {
  if (!confirm(`${date} の ${staffName} さんのデータを削除しますか？`)) return;
  
  logs.forEach(l => {
    if (getLocalDateString(l.timestamp) === date && l.staff_name === staffName) {
      deletedLogIds.add(l.id);
    }
  });
  
  logs = logs.filter(l => 
    !(getLocalDateString(l.timestamp) === date && l.staff_name === staffName)
  );
  
  renderAll();
  showToast('削除を記録しました（保存ボタンを押してください）');
}

// 全変更保存
async function saveAllChanges() {
  if (isSaving) return;
  
  isSaving = true;
  showToast('保存中...');
  
  try {
    // ログ変更の保存
    const logsToSave = [];
    
    // 削除されたログ
    deletedLogIds.forEach(id => {
      logsToSave.push({ id, deleted: true });
    });
    
    // 変更されたログ
    modifiedLogs.forEach(log => {
      logsToSave.push(log);
    });
    
    // 新規追加ログ
    logs.forEach(l => {
      if (!l.id || l.id > Date.now() - 10000) { // 最近追加されたもの
        logsToSave.push(l);
      }
    });
    
    if (logsToSave.length > 0) {
      const res = await fetch('/api/logs/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ logs: logsToSave })
      });
      
      const result = await res.json();
      
      if (!result.success) {
        throw new Error(result.error || '保存失敗');
      }
    }
    
    // 変更をリセット
    modifiedLogs.clear();
    deletedLogIds.clear();
    
    // 再同期
    await syncFromServer();
    
    showToast('✅ 保存完了しました');
  } catch (e) {
    console.error('Save error:', e);
    showToast('❌ 保存エラー: ' + e.message);
  } finally {
    isSaving = false;
  }
}

// 設定画面を開く
function openSettings() {
  // 現在の設定をフォームにセット
  $('closingDay').value = settings.closingDay || '20';
  $('roundUnit').value = settings.roundUnit || '1';
  $('shopCloseTime').value = settings.shopCloseTime || '23:00';
  $('workStartTime').value = settings.workStartTime || '09:00';
  $('breakStart').value = settings.breakStart || '14:15';
  $('breakEnd').value = settings.breakEnd || '17:15';
  
  // スタッフリスト表示
  let html = `
    <table>
      <thead>
        <tr>
          <th>社員番号</th>
          <th>名前</th>
          <th>休憩開始</th>
          <th>休憩終了</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
  `;
  
  staff.forEach((s, i) => {
    html += `
      <tr>
        <td>
          <input 
            type="text" 
            value="${s.emp_id || ''}" 
            class="w-16 px-2 py-1 border rounded text-center"
            onchange="staff[${i}].emp_id=this.value"
          >
        </td>
        <td>${s.name}</td>
        <td>
          <input 
            type="time" 
            value="${s.break_start || ''}" 
            class="px-2 py-1 border rounded"
            onchange="staff[${i}].break_start=this.value"
          >
        </td>
        <td>
          <input 
            type="time" 
            value="${s.break_end || ''}" 
            class="px-2 py-1 border rounded"
            onchange="staff[${i}].break_end=this.value"
          >
        </td>
        <td>
          <button 
            onclick="deleteStaff(${i})" 
            class="px-2 py-1 text-xs text-red-600 border border-red-600 rounded hover:bg-red-50"
          >
            削除
          </button>
        </td>
      </tr>
    `;
  });
  
  html += '</tbody></table>';
  
  $('staffListEdit').innerHTML = html;
  $('settingsModal').classList.remove('hidden');
}

// スタッフ追加
function addStaff() {
  const nameInput = $('newStaffName');
  const name = nameInput.value.trim();
  
  if (!name) {
    alert('スタッフ名を入力してください');
    return;
  }
  
  if (staff.some(s => s.name === name)) {
    alert('既に存在するスタッフ名です');
    return;
  }
  
  staff.push({
    name,
    emp_id: '',
    break_start: '',
    break_end: ''
  });
  
  nameInput.value = '';
  openSettings(); // リスト再描画
}

// スタッフ削除
async function deleteStaff(index) {
  if (!confirm(`${staff[index].name} さんを削除しますか？`)) return;
  
  const staffId = staff[index].id;
  
  if (staffId) {
    try {
      const res = await fetch('/api/staff/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: staffId })
      });
      
      const result = await res.json();
      if (!result.success) {
        throw new Error(result.error || '削除失敗');
      }
    } catch (e) {
      alert('削除エラー: ' + e.message);
      return;
    }
  }
  
  staff.splice(index, 1);
  openSettings();
}

// 設定保存
async function saveSettings() {
  showToast('設定を保存中...');
  
  try {
    // システム設定保存
    const newSettings = {
      closingDay: $('closingDay').value,
      roundUnit: $('roundUnit').value,
      shopCloseTime: $('shopCloseTime').value,
      workStartTime: $('workStartTime').value,
      breakStart: $('breakStart').value,
      breakEnd: $('breakEnd').value
    };
    
    const settingsRes = await fetch('/api/settings/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ settings: newSettings })
    });
    
    if (!settingsRes.ok) throw new Error('設定保存失敗');
    
    // スタッフ情報保存
    const staffRes = await fetch('/api/staff/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ staff })
    });
    
    if (!staffRes.ok) throw new Error('スタッフ保存失敗');
    
    settings = newSettings;
    
    $('settingsModal').classList.add('hidden');
    
    await syncFromServer();
    
    showToast('✅ 設定を保存しました');
  } catch (e) {
    alert('保存エラー: ' + e.message);
  }
}

// Excel出力
function exportToExcel() {
  const targetMonth = $('displayMonth').value;
  const data = processData(targetMonth);
  
  const wb = XLSX.utils.book_new();
  
  // 集計シート
  const summary = staff.map(s => {
    const d = data.find(x => x.staff === s.name);
    return {
      "社員番号": s.emp_id || "",
      "名前": s.name,
      "出勤日数": d ? d.days : 0,
      "実働(h)": d ? d.workH.toFixed(2) : "0.00",
      "残業(h)": d ? d.otH.toFixed(2) : "0.00"
    };
  });
  
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summary), "集計");
  
  XLSX.writeFile(wb, `松乃木飯店_出勤簿_${targetMonth}.xlsx`);
  
  showToast('Excelファイルをダウンロードしました');
}

// ユーティリティ関数
function getPeriod(targetMonth) {
  const [y, m] = targetMonth.split('-').map(Number);
  const closingDay = parseInt(settings.closingDay || 20);
  
  return {
    start: new Date(y, m - 2, closingDay + 1, 0, 0, 0),
    end: new Date(y, m - 1, closingDay, 23, 59, 59)
  };
}

function getLocalDateString(ts) {
  return new Date(ts).toLocaleDateString('sv');
}

function processData(targetMonth) {
  const { start, end } = getPeriod(targetMonth);
  const groups = {};
  
  logs.forEach(l => {
    const d = new Date(l.timestamp);
    if (d < start || d > end) return;
    
    const key = `${getLocalDateString(l.timestamp)}_${l.staff_name}`;
    if (!groups[key]) {
      groups[key] = {
        date: getLocalDateString(l.timestamp),
        staff: l.staff_name,
        ins: [],
        outs: []
      };
    }
    
    if (l.type === 'IN') groups[key].ins.push(l);
    else groups[key].outs.push(l);
  });
  
  // 日付順にソート
  const sortedGroups = Object.values(groups).sort((a, b) => 
    new Date(a.date) - new Date(b.date)
  );
  
  // 各グループのログをソート
  sortedGroups.forEach(g => {
    g.ins.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
    g.outs.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
  });
  
  // スタッフごとの集計
  const staffSummary = staff.map(s => {
    const staffGroups = sortedGroups.filter(g => g.staff === s.name);
    let totalMs = 0;
    
    staffGroups.forEach(g => {
      const workStart = settings.workStartTime || '09:00';
      const [wsh, wsm] = workStart.split(':').map(Number);
      
      const breakStart = s.break_start || settings.breakStart || '14:15';
      const breakEnd = s.break_end || settings.breakEnd || '17:15';
      
      for (let i = 0; i < Math.min(g.ins.length, g.outs.length); i++) {
        let inT = new Date(g.ins[i].timestamp);
        let outT = new Date(g.outs[i].timestamp);
        
        if (i === 0) {
          const limit = new Date(inT);
          limit.setHours(wsh, wsm, 0, 0);
          if (inT < limit) inT = limit;
        }
        
        let ms = outT - inT;
        
        if (i === 0 && breakStart && breakEnd) {
          const [bsh, bsm] = breakStart.split(':').map(Number);
          const [beh, bem] = breakEnd.split(':').map(Number);
          
          const bS = new Date(inT);
          bS.setHours(bsh, bsm, 0, 0);
          
          const bE = new Date(inT);
          bE.setHours(beh, bem, 0, 0);
          
          const overlap = Math.min(outT, bE) - Math.max(inT, bS);
          if (overlap > 0) ms -= overlap;
        }
        
        totalMs += Math.max(0, ms);
      }
    });
    
    const workH = totalMs / 3600000;
    const otH = Math.max(0, workH - (staffGroups.length * 8));
    
    return {
      staff: s.name,
      days: staffGroups.length,
      workH,
      otH
    };
  });
  
  return sortedGroups.map(g => {
    const summary = staffSummary.find(s => s.staff === g.staff);
    return { ...g, ...summary };
  });
}

function showToast(msg) {
  const toast = $('toast');
  toast.innerText = msg;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 2500);
}
